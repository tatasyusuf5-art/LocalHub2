name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/localhub.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/localhub.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VERSION_CODE: ${{ github.run_number }}
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace -Dorg.gradle.jvmargs="-Xmx4g"

      # Eklenen bölüm burası:
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
