name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Tüm işlemlerin LocalHub2 klasörü içinde yapılacağını belirtiyoruz:
    defaults:
      run:
        working-directory: LocalHub2

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew
        
      - name: Build APK
        run: ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalHub-APK
          # Klasör yolu değiştiği için path'i de güncelledik:
          path: LocalHub2/app/build/outputs/apk/debug/app-debug.apk

