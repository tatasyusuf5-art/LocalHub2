name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew
        
      # KSP hatasını önlemek için -Dorg.gradle.project.java.awt.headless=true eklenmiştir
      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.java.awt.headless=true
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalHub-APK
          path: app/build/outputs/apk/debug/app-debug.apk
