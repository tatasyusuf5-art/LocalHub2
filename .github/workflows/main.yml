name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # working-directory kullanmıyoruz, her şeyi doğrudan LocalHub2 klasörüne yönlendiriyoruz
      - name: Grant execute permission
        run: chmod +x LocalHub2/gradlew
        
      - name: Build APK
        run: ./LocalHub2/gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalHub-APK
          path: LocalHub2/app/build/outputs/apk/debug/app-debug.apk
